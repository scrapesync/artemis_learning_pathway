<!DOCTYPE html>
<html lang="en">
<head>

<title>ArtemisAI — Team Learning Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2L30 28H2Z' fill='%2300d4aa'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a13;--card:#0d1117;--card-hover:#111827;--border:#1e293b;--border-hi:#334155;--teal:#00d4aa;--teal-dim:rgba(0,212,170,.15);--indigo:#6366f1;--indigo-dim:rgba(99,102,241,.15);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.15);--rose:#f43f5e;--rose-dim:rgba(244,63,94,.15);--sky:#38bdf8;--sky-dim:rgba(56,189,248,.15);--lime:#84cc16;--lime-dim:rgba(132,204,22,.15);--violet:#a78bfa;--violet-dim:rgba(167,139,250,.15);--pink:#ec4899;--pink-dim:rgba(236,72,153,.15);--text:#e2e8f0;--muted:#64748b;--dim:#475569;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}::selection{background:var(--teal);color:var(--bg)}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(0,212,170,.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(99,102,241,.04) 0%,transparent 50%),var(--bg)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:560px;text-align:center;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}.login-logo{font-family:var(--mono);font-size:15px;letter-spacing:.15em;color:var(--teal);text-transform:uppercase}.login-title{font-size:26px;font-weight:700;margin-bottom:6px}.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.login-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.login-btn{background:var(--card-hover);border:1px solid var(--border);border-radius:10px;padding:14px 6px 10px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.login-btn:hover{border-color:var(--teal);background:var(--teal-dim);transform:translateY(-2px)}
.login-btn .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--mono)}
.login-btn .lt{font-size:8px;color:var(--teal);font-family:var(--mono);letter-spacing:.03em;text-align:center;line-height:1.3;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Password Modal */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:999;align-items:center;justify-content:center}
.pw-overlay.show{display:flex}
.pw-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;width:320px;text-align:center;animation:fadeUp .3s ease}
.pw-box h3{font-size:16px;margin-bottom:4px}.pw-box .pw-role{font-size:10px;color:var(--teal);font-family:var(--mono);margin-bottom:20px}
.pw-input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}.pw-input:focus{border-color:var(--teal)}
.pw-input.error{border-color:var(--rose);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.pw-submit{width:100%;padding:10px;background:var(--teal);border:none;border-radius:8px;color:var(--bg);font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;transition:opacity .15s}.pw-submit:hover{opacity:.85}
.pw-cancel{margin-top:10px;background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer}.pw-cancel:hover{color:var(--text)}
.pw-error{color:var(--rose);font-size:11px;font-family:var(--mono);margin-bottom:8px;min-height:16px}
#app{display:none}.topbar{position:sticky;top:0;z-index:100;background:rgba(6,10,19,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}.topbar-logo-wrap{display:flex;align-items:center;gap:6px}.topbar-logo{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--teal);text-transform:uppercase}.topbar-sep{color:var(--border-hi)}.topbar-user{font-size:14px;font-weight:600}.topbar-title{font-size:10px;color:var(--teal);font-family:var(--mono);display:block}
.topbar-right{display:flex;align-items:center;gap:12px}.topbar-stat{font-family:var(--mono);font-size:12px;color:var(--muted)}.topbar-stat b{color:var(--teal)}
.btn-logout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s}.btn-logout:hover{border-color:var(--rose);color:var(--rose)}
.main{max-width:1100px;margin:0 auto;padding:32px 24px}.hero-greeting{font-size:22px;font-weight:300;margin-bottom:4px;color:var(--muted)}.hero-greeting b{color:var(--text);font-weight:600}.hero-tagline{font-family:var(--mono);font-size:11px;color:var(--teal);letter-spacing:.08em;margin-bottom:28px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}.stat-label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}.stat-value{font-size:28px;font-weight:700}.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}.tab{background:none;border:1px solid transparent;border-radius:8px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--muted);padding:8px 14px;cursor:pointer;transition:all .15s}.tab:hover{color:var(--text);border-color:var(--border)}.tab.active{color:var(--teal);border-color:var(--teal);background:var(--teal-dim)}
.phase-section{margin-bottom:32px;animation:fadeUp .4s}.phase-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.phase-badge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;white-space:nowrap}.phase-progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;min-width:60px}.phase-progress-fill{height:100%;border-radius:2px;transition:width .4s}.phase-pct{font-family:var(--mono);font-size:12px;font-weight:600;min-width:36px;text-align:right}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;user-select:none}.skill-card:hover{border-color:var(--border-hi);background:var(--card-hover)}.skill-card.watched{border-color:var(--teal);background:var(--teal-dim)}.skill-card.watched .sk-check{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.sk-top{display:flex;align-items:flex-start;gap:12px}.sk-check{width:26px;height:26px;border-radius:7px;flex-shrink:0;margin-top:1px;border:2px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}.sk-info{flex:1;min-width:0}.sk-name{font-size:13px;font-weight:600;margin-bottom:2px}.sk-desc{font-size:11px;color:var(--muted);line-height:1.4}
.sk-artemis{margin-top:8px;padding:8px 10px;background:rgba(0,212,170,.05);border:1px solid rgba(0,212,170,.12);border-radius:6px;font-size:11px;color:var(--teal);line-height:1.4}
.sk-artemis::before{content:'🎯 ';font-size:10px}
.sk-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}.sk-dur{font-family:var(--mono);font-size:10px;color:var(--dim)}.sk-link{font-family:var(--mono);font-size:10px;color:var(--indigo);text-decoration:none;padding:3px 8px;border:1px solid rgba(99,102,241,.3);border-radius:4px;transition:all .15s}.sk-link:hover{background:var(--indigo-dim);border-color:var(--indigo)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:20px}.team-member-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:all .2s}.team-member-card:hover{border-color:var(--border-hi);transform:translateY(-2px)}
.tm-avatar{width:48px;height:48px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;font-family:var(--mono)}.tm-name{font-size:14px;font-weight:600;margin-bottom:2px}.tm-title{font-size:10px;color:var(--teal);font-family:var(--mono);margin-bottom:10px;min-height:14px}.tm-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}.tm-bar-fill{height:100%;border-radius:3px;transition:width .4s}.tm-stats{font-family:var(--mono);font-size:11px;color:var(--muted)}.tm-stats b{color:var(--teal)}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.topbar{padding:0 14px}.main{padding:20px 14px}.topbar-stat{display:none}}@media(max-width:520px){.login-grid{grid-template-columns:1fr 1fr}.stats-row{grid-template-columns:1fr}.skills-grid{grid-template-columns:1fr}.team-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

var(--rose)", "pd": "var(--rose-dim)", "name": "Anthropic Interactive Tutorial (GitHub)", "desc": "9 chapters with exercises \u2014 practice writing and troubleshooting prompts hands-on", "artemis": "Build the muscle memory for writing prompts that generate correct code, debug Lambda errors, draft architecture docs", "url": "https://github.com/anthropics/prompt-eng-interactive-tutorial", "dur": "2-3h"}, {"id": "pe03", "phase": "prompt-eng", "pn": "\u2605 Prompt Engineering for Claude", "pc": "var(--rose)", "pd": "var(--rose-dim)", "name": "ChatGPT Prompt Engineering (DeepLearning.AI)", "desc": "Andrew Ng + OpenAI: few-shot, CoT, structured output \u2014 applies directly to Claude", "artemis": "Write better prompts for DeepSeek labelling pipeline, Art-E system prompts, and daily Claude usage", "url": "https://learn.deeplearning.ai/courses/chatgpt-prompt-eng", "dur": "1h"}, {"id": "pe04", "phase": "prompt-eng", "pn": "\u2605 Prompt Engineering for Claude", "pc": "var(--rose)", "pd": "var(--rose-dim)", "name": "Claude 4 Best Practices", "desc": "Claude 4.6 specific: thinking tags, tool use, agentic prompting, frontend design prompts", "artemis": "Using Claude Opus for code generation, architecture decisions, sprint planning, and document creation", "url": "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/claude-4-best-practices", "dur": "20m read"},{"id": "t01", "phase": "foundations", "pn": "Foundations", "pc": "var(--teal)", "pd": "var(--teal-dim)", "name": "Backpropagation & Micrograd", "desc": "How neural networks learn \u2014 building an autograd engine from scratch", "artemis": "This is how our 6 NLP models update their weights during fine-tuning on DeepSeek data", "url": "https://www.youtube.com/watch?v=VMj-3S1tku0", "dur": "2h 25m"}, {"id": "t02", "phase": "foundations", "pn": "Foundations", "pc": "var(--teal)", "pd": "var(--teal-dim)", "name": "Language Modelling (makemore)", "desc": "Building a bigram character-level language model with "Free hands-on course from Anthropic \u2014 be productive with Cowork in your first week", "artemis": "Every ArtemisAI team member should know this tool \u2014 it replaces hours of manual work", "url": "https://anthropic.skilljar.com/introduction-to-claude-cowork", "dur": "30m"},{"id": "pe01", "phase": "prompt-eng", "pn": "\u2605 Prompt Engineering for Claude", "pc": "var(--rose)", "pd": "var(--rose-dim)", "name": "Anthropic Prompt Engineering Guide (PDF)", "desc": "6 simple techniques to get better answers from Claude \u2014 be clear, give examples, set context", "artemis": "Ask Claude better questions about ArtemisAI strategy, market research, client communications, meeting prep", "url": "https://www-cdn.anthropic.com/62df988c101af71291b06843b63d39bbd600bed8.pdf", "dur": "15m read"}, {"id": "pe02", "phase": "prompt-eng", "pn": "\u2605 Prompt Engineering for Claude", "pc": "var(--rose)", "pd": "var(--rose-dim)", "name": "ChatGPT Prompt Engineering (DeepLearning.AI)", "desc": "Andrew Ng's beginner-friendly course on writing effective AI prompts", "artemis": "Use Claude daily for emails, research, brainstorming, and summarising meetings \u2014 this makes it 10x better", "url": "https://learn.deeplearning.ai/courses/chatgpt-prompt-eng", "dur": "1h"},{"id": "h01", "phase": "ai-101", "pn": "AI 101", "pc": "var(--pink)", "pd": "var(--pink-dim)", "name": "AI Explained in 5 Minutes", "desc": "The gentlest introduction to artificial intelligence \u2014 zero jargon", "artemis": "ArtemisAI uses AI to read social media posts and find patterns humans would miss", "url": "https://www.youtube.com/watch?v=2ePf9rue1Ao", "dur": "5m"}, {"id": "h02", "phase": "ai-101", "pn": "AI 101", "pc": "var(--pink)", "pd": "var(--pink-dim)", "name": "What is ChatGPT? (Simple)", "desc": "How AI chatbots work \u2014 the technology behind Art-E explained simply", "artemis": "Art-E is ArtemisAI's chatbot \u2014 it answers questions about brand social media data", "url": "https://www.youtube.com/watch?v=RN6nicTVMUY", "dur": "8m"}, {"id": "h03", "phase": "ai-101", "pn": "AI 101", "pc": "var(--pink)", "pd": "var(--pink-dim)", "name": "AI Buzzwords Explained", "desc": "NLP, ML, neural network, algorithm, model \u2014 all in plain English", "artemis": "Follow team conversations without getting lost in technical jargon", "url": "https://www.youtube.com/watch?v=lM6GzcmjXDI", "dur": "10m"}, {"id": "h04", "phase": "coord", "pn": "Coordination", "pc": "var(--amber)", "pd": "var(--amber-dim)", "name": "How Sprints Work (Agile Basics)", "desc": "Plan \u2192 Build \u2192 Review \u2192 Repeat \u2014 the 2-week team rhythm", "artemis": "Understanding when to schedule meetings and what each ceremony covers", "url": "https://www.youtube.com/watch?v=XU0llRltyFM", "dur": "10m"}, {"id": "h05", "phase": "coord", "pn": "Coordination", "pc": "var(--amber)", "pd": "var(--amber-dim)", "name": "Running Effective Meetings", "desc": "Agendas, time-boxing, action items \u2014 making every meeting count", "artemis": "Sprint planning, reviews, and standups run smoothly when well-coordinated", "url": "https://www.youtube.com/watch?v=YGpqQZGkjf0", "dur": "12m"}]};

let currentUser=null,activeTab='my-skills',pendingUid=null;
function gs(){try{return JSON.parse(localStorage.getItem('artemis_v3')||'{}')}catch{return{}}}
function ss(d){localStorage.setItem('artemis_v3',JSON.stringify(d))}
function gp(u){return gs()[u]||{}}
function sd(u,s,done){const d=gs();if(!d[u])d[u]={};if(done)d[u][s]=Date.now();else delete d[u][s];ss(d)}
function skills(u){return SKILL_PATHS[u]||[]}
function cd(u){const p=gp(u);return skills(u).filter(s=>p[s.id]).length}
function ts(u){return skills(u).length}

function renderLogin(){document.getElementById('login-grid').innerHTML=TEAM.map(t=>`<button class="login-btn" onclick="showPw('${t.id}')"><div class="avatar" style="background:${t.colorDim};color:${t.color}">${t.initials}</div><span>${t.name.split(' ')[0]}</span><span class="lt">${t.title}</span></button>`).join('')}

function showPw(uid){pendingUid=uid;const u=TEAM.find(t=>t.id===uid);document.getElementById('pw-avatar').innerHTML=`<div class="avatar" style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;font-family:var(--mono);background:${u.colorDim};color:${u.color};margin:0 auto 8px">${u.initials}</div>`;document.getElementById('pw-name').textContent=u.name;document.getElementById('pw-role').textContent=u.title;document.getElementById('pw-error').textContent='';document.getElementById('pw-input').value='';document.getElementById('pw-input').classList.remove('error');document.getElementById('pw-overlay').classList.add('show');setTimeout(()=>document.getElementById('pw-input').focus(),100)}

function closePw(){document.getElementById('pw-overlay').classList.remove('show');pendingUid=null}

function submitPw(){const u=TEAM.find(t=>t.id===pendingUid);const pw=document.getElementById('pw-input').value;if(pw!==u.pass){document.getElementById('pw-error').textContent='Incorrect password';document.getElementById('pw-input').classList.add('error');setTimeout(()=>document.getElementById('pw-input').classList.remove('error'),400);return}closePw();currentUser=u;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';activeTab='my-skills';renderApp()}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('pw-overlay').classList.contains('show'))submitPw();if(e.key==='Escape')closePw()});

function logout(){currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex'}

function renderApp(){const u=currentUser,sk=skills(u.id),total=sk.length,done=cd(u.id),pct=total?Math.round(done/total*100):0;
document.getElementById('topbar-user').textContent=u.name+' ';document.getElementById('topbar-title').textContent=u.title;
document.getElementById('stat-done').textContent=done;document.getElementById('stat-total').textContent=total;
const hr=new Date().getHours(),greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
document.getElementById('hero-greeting').innerHTML=`${greet}, <b>${u.name.split(' ')[0]}</b>`;
document.getElementById('hero-tagline').textContent=done===0?`${total} videos tailored for your role`:`${pct}% watched — ${total-done} remaining`;
renderStats();renderTabs();renderContent()}

function renderStats(){const u=currentUser,sk=skills(u.id),progress=gp(u.id),done=sk.filter(s=>progress[s.id]).length,total=sk.length,pct=total?Math.round(done/total*100):0;
const phases=[...new Set(sk.map(s=>s.phase))];const ps=phases.map(pid=>{const pk=sk.filter(s=>s.phase===pid),d=pk.filter(s=>progress[s.id]).length;return{name:pk[0].pn,pct:Math.round(d/pk.length*100),color:pk[0].pc}}).sort((a,b)=>b.pct-a.pct);const tp=ps[0];
const tss=Object.values(progress).filter(v=>typeof v==='number').sort((a,b)=>b-a);let streak=0;if(tss.length){let ck=new Date();ck.setHours(0,0,0,0);for(let i=0;i<365;i++){const ds=new Date(ck),de=new Date(ds);de.setDate(de.getDate()+1);if(tss.some(t=>t>=ds.getTime()&&t<de.getTime())){streak++;ck.setDate(ck.getDate()-1)}else break}}
document.getElementById('stats-row').innerHTML=`<div class="stat-card"><div class="stat-label">Watched</div><div class="stat-value" style="color:var(--teal)">${done}</div><div class="stat-sub">of ${total} videos</div></div><div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value">${pct}%</div><div class="stat-sub">${total-done} remaining</div></div><div class="stat-card"><div class="stat-label">Top Phase</div><div class="stat-value" style="font-size:14px;color:${tp?.color||'var(--muted)'}">${tp?.name||'—'}</div><div class="stat-sub">${tp?.pct||0}% done</div></div><div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value" style="color:var(--amber)">${streak}</div><div class="stat-sub">day${streak!==1?'s':''}</div></div>`}

function renderTabs(){const sk=skills(currentUser.id),phases=[...new Map(sk.map(s=>[s.phase,s.pn])).entries()];
const tabs=[{id:'my-skills',label:'All Videos'},{id:'team',label:'Team'},...phases.map(([id,nm])=>({id,label:nm}))];
document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}

function switchTab(id){activeTab=id;renderTabs();renderContent()}

function renderContent(){const el=document.getElementById('content');if(activeTab==='team')return renderTeamView(el);
const sk=skills(currentUser.id),phases=[...new Set(sk.map(s=>s.phase))];
if(activeTab==='my-skills')el.innerHTML=phases.map(pid=>renderPhaseBlock(sk.filter(s=>s.phase===pid))).join('');
else{const f=sk.filter(s=>s.phase===activeTab);el.innerHTML=f.length?renderPhaseBlock(f):'<p style="color:var(--muted)">No videos here.</p>'}}

function renderPhaseBlock(sk){if(!sk.length)return'';const progress=gp(currentUser.id),f=sk[0],done=sk.filter(s=>progress[s.id]).length,pct=Math.round(done/sk.length*100);
return`<div class="phase-section"><div class="phase-header"><span class="phase-badge" style="background:${f.pd};color:${f.pc}">${f.pn}</span><div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%;background:${f.pc}"></div></div><span class="phase-pct" style="color:${f.pc}">${done}/${sk.length}</span></div><div class="skills-grid">${sk.map(s=>{const d=!!progress[s.id];return`<div class="skill-card ${d?'watched':''}" style="${d?`border-color:${f.pc};background:${f.pd}`:''}" onclick="toggleSkill('${s.id}')"><div class="sk-top"><div class="sk-check" style="${d?`background:${f.pc};border-color:${f.pc}`:''}"> ${d?'✓':''}</div><div class="sk-info"><div class="sk-name">${s.name}</div><div class="sk-desc">${s.desc}</div></div></div><div class="sk-artemis">${s.artemis}</div><div class="sk-footer"><span class="sk-dur">${s.dur}</span><a class="sk-link" href="${s.url}" target="_blank" onclick="event.stopPropagation()">▶ Watch</a></div></div>`}).join('')}</div></div>`}

function toggleSkill(sid){const p=gp(currentUser.id);sd(currentUser.id,sid,!p[sid]);renderApp()}

function renderTeamView(el){const sorted=[...TEAM].sort((a,b)=>{const ap=ts(a.id)?cd(a.id)/ts(a.id):0,bp=ts(b.id)?cd(b.id)/ts(b.id):0;return bp-ap});
const lb=sorted.map((t,i)=>{const d=cd(t.id),tot=ts(t.id),pct=tot?Math.round(d/tot*100):0,m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
return`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px"><span style="font-size:16px;width:28px;text-align:center">${m||`<span style="color:var(--dim);font-family:var(--mono);font-size:12px">${i+1}</span>`}</span><div class="tm-avatar" style="width:32px;height:32px;font-size:11px;background:${t.colorDim};color:${t.color}">${t.initials}</div><div style="flex:1"><div style="font-weight:500;font-size:13px">${t.name}</div><div style="font-size:10px;color:var(--teal);font-family:var(--mono)">${t.title}</div></div><span style="font-family:var(--mono);font-size:12px;color:${t.color}">${d}/${tot}</span><span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:36px;text-align:right">${pct}%</span></div>`}).join('');
const cards=TEAM.map(t=>{const d=cd(t.id),tot=ts(t.id),pct=tot?Math.round(d/tot*100):0;
return`<div class="team-member-card"><div class="tm-avatar" style="background:${t.colorDim};color:${t.color}">${t.initials}</div><div class="tm-name">${t.name}</div><div class="tm-title">${t.title}</div><div class="tm-bar"><div class="tm-bar-fill" style="width:${pct}%;background:${t.color}"></div></div><div class="tm-stats"><b>${d}</b> / ${tot} · ${pct}%</div></div>`}).join('');
el.innerHTML=`<div style="margin-bottom:28px"><h3 style="font-size:16px;font-weight:600;margin-bottom:14px">Leaderboard</h3>${lb}</div><h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Team Progress</h3><div class="team-grid">${cards}</div>`}

renderLogin();
</script>
