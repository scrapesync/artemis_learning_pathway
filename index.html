S('j06','ops','Operations & Management','var(--pink)','var(--pink-dim)','ClickUp & Project Tracking','Tasks, sprint boards, checking progress, updating statuses','Core · Daily tool'),
S('j07','ops','Operations & Management','var(--pink)','var(--pink-dim)','Budget & Cost Awareness','AWS costs, SageMaker spend, per-page pricing — what it costs to run','Core · Financial oversight'),
S('j08','ops','Operations & Management','var(--pink)','var(--pink-dim)','Client Communication','How to talk about ArtemisAI to non-technical people, key talking points','Core · Growth support'),
];

const HANNAH_SKILLS=[
S('h01','ai-101','AI 101','var(--pink)','var(--pink-dim)','What is Artificial Intelligence?','Computers learning patterns from data — smart pattern recognition','10 min · Start here'),
S('h02','ai-101','AI 101','var(--pink)','var(--pink-dim)','What are LLMs?','Large Language Models like ChatGPT: AI that reads and writes text','10 min · The tech behind Art-E'),
S('h03','ai-101','AI 101','var(--pink)','var(--pink-dim)','What ArtemisAI Does (Simple)','Reads thousands of posts and tells brands what people think','5 min · The one-liner'),
S('h04','ai-101','AI 101','var(--pink)','var(--pink-dim)','AI Buzzwords Decoded','NLP, sentiment, ML, neural networks — plain English definitions','15 min · Never nod confused again'),
S('h05','coord','Coordination','var(--amber)','var(--amber-dim)','How Sprints Work','2-week cycles: plan → build → review → repeat','Core · Team cadence'),
S('h06','coord','Coordination','var(--amber)','var(--amber-dim)','Who Does What','Asad architects, Faheem builds ML, Rafeh validates, Lewis connects pages','Core · Coordination context'),
S('h07','coord','Coordination','var(--amber)','var(--amber-dim)','Meeting & Schedule Management','Sprint planning, reviews, standups — when and what to prepare','Core · Keeping everyone aligned'),
];

const SKILL_PATHS={asad:TECH_SKILLS,faheem:TECH_SKILLS,rafeh:RAFEH_SKILLS,filza:FILZA_SKILLS,alex:ALEX_SKILLS,lewis:LEWIS_SKILLS,jill:JILL_SKILLS,hannah:HANNAH_SKILLS};

let currentUser=null,activeTab='my-skills';
function getStorage(){try{return JSON.parse(localStorage.getItem('artemis_learn_v2')||'{}')}catch{return{}}}
function saveStorage(d){localStorage.setItem('artemis_learn_v2',JSON.stringify(d))}
function getUserProgress(u){return getStorage()[u]||{}}
function setSkillDone(u,s,done){const d=getStorage();if(!d[u])d[u]={};if(done)d[u][s]=Date.now();else delete d[u][s];saveStorage(d)}
function getUserSkills(u){return SKILL_PATHS[u]||[]}
function countDone(u){const p=getUserProgress(u);return getUserSkills(u).filter(s=>p[s.id]).length}
function totalSkills(u){return getUserSkills(u).length}

function renderLogin(){document.getElementById('login-grid').innerHTML=TEAM.map(t=>`<button class="login-btn" onclick="login('${t.id}')"><div class="avatar" style="background:${t.colorDim};color:${t.color}">${t.initials}</div><span>${t.name.split(' ')[0]}</span></button>`).join('')}

function login(uid){const user=TEAM.find(t=>t.id===uid);if(!user)return;const pw=prompt('Enter password for '+user.name.split(' ')[0]+':');if(pw===null)return;if(pw!==user.pass){alert('Incorrect password.');return}currentUser=user;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';activeTab='my-skills';renderApp()}

function logout(){currentUser=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex'}

function renderApp(){
const u=currentUser,skills=getUserSkills(u.id),total=skills.length,done=countDone(u.id),pct=total?Math.round(done/total*100):0;
document.getElementById('topbar-user').textContent=u.name+' ';document.getElementById('topbar-title').textContent=u.title;
document.getElementById('stat-done').textContent=done;document.getElementById('stat-total').textContent=total;
const hr=new Date().getHours(),greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
document.getElementById('hero-greeting').innerHTML=`${greet}, <b>${u.name.split(' ')[0]}</b>`;
document.getElementById('hero-tagline').textContent=done===0?`${total} skills tailored for your role`:`${pct}% complete — ${total-done} remaining`;
renderStats();renderTabs();renderContent()}

function renderStats(){
const u=currentUser,skills=getUserSkills(u.id),progress=getUserProgress(u.id),done=skills.filter(s=>progress[s.id]).length,total=skills.length,pct=total?Math.round(done/total*100):0;
const phases=[...new Set(skills.map(s=>s.phase))];
const ps=phases.map(pid=>{const sk=skills.filter(s=>s.phase===pid),d=sk.filter(s=>progress[s.id]).length;return{name:sk[0].phaseName,pct:Math.round(d/sk.length*100),color:sk[0].phaseColor}}).sort((a,b)=>b.pct-a.pct);
const tp=ps[0];
const ts=Object.values(progress).filter(v=>typeof v==='number').sort((a,b)=>b-a);
let streak=0;if(ts.length){let ck=new Date();ck.setHours(0,0,0,0);for(let i=0;i<365;i++){const ds=new Date(ck),de=new Date(ds);de.setDate(de.getDate()+1);if(ts.some(t=>t>=ds.getTime()&&t<de.getTime())){streak++;ck.setDate(ck.getDate()-1)}else break}}
document.getElementById('stats-row').innerHTML=`
<div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:var(--teal)">${done}</div><div class="stat-sub">of ${total} skills</div></div>
<div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value">${pct}%</div><div class="stat-sub">${total-done} remaining</div></div>
<div class="stat-card"><div class="stat-label">Top Phase</div><div class="stat-value" style="font-size:14px;color:${tp?.color||'var(--muted)'}">${tp?.name||'—'}</div><div class="stat-sub">${tp?.pct||0}% done</div></div>
<div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value" style="color:var(--amber)">${streak}</div><div class="stat-sub">day${streak!==1?'s':''}</div></div>`}

function renderTabs(){
const skills=getUserSkills(currentUser.id),phases=[...new Map(skills.map(s=>[s.phase,s.phaseName])).entries()];
const tabs=[{id:'my-skills',label:'All Skills'},{id:'team',label:'Team'},...phases.map(([id,nm])=>({id,label:nm}))];
document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}

function switchTab(id){activeTab=id;renderTabs();renderContent()}

function renderContent(){
const el=document.getElementById('content');if(activeTab==='team')return renderTeamView(el);
const skills=getUserSkills(currentUser.id),phases=[...new Set(skills.map(s=>s.phase))];
if(activeTab==='my-skills'){el.innerHTML=phases.map(pid=>renderPhaseBlock(skills.filter(s=>s.phase===pid))).join('')}
else{const f=skills.filter(s=>s.phase===activeTab);el.innerHTML=f.length?renderPhaseBlock(f):'<p style="color:var(--muted)">No skills here.</p>'}}

function renderPhaseBlock(sk){
if(!sk.length)return '';const progress=getUserProgress(currentUser.id),f=sk[0],done=sk.filter(s=>progress[s.id]).length,pct=Math.round(done/sk.length*100);
return `<div class="phase-section"><div class="phase-header"><span class="phase-badge" style="background:${f.phaseDim};color:${f.phaseColor}">${f.phaseName}</span><div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%;background:${f.phaseColor}"></div></div><span class="phase-pct" style="color:${f.phaseColor}">${done}/${sk.length}</span></div><div class="skills-grid">${sk.map(s=>{const d=!!progress[s.id];return`<div class="skill-card ${d?'completed':''}" onclick="toggleSkill('${s.id}')" style="${d?`border-color:${f.phaseColor};background:${f.phaseDim}`:''}"><div class="skill-check" style="${d?`background:${f.phaseColor};border-color:${f.phaseColor}`:''}">${d?'✓':''}</div><div class="skill-info"><div class="skill-name">${s.name}</div><div class="skill-desc">${s.desc}</div><div class="skill-meta">${s.meta}</div></div></div>`}).join('')}</div></div>`}

function toggleSkill(sid){const p=getUserProgress(currentUser.id);setSkillDone(currentUser.id,sid,!p[sid]);renderApp()}

function renderTeamView(el){
const sorted=[...TEAM].sort((a,b)=>{const ap=totalSkills(a.id)?countDone(a.id)/totalSkills(a.id):0,bp=totalSkills(b.id)?countDone(b.id)/totalSkills(b.id):0;return bp-ap});
const lb=sorted.map((t,i)=>{const d=countDone(t.id),tot=totalSkills(t.id),pct=tot?Math.round(d/tot*100):0,m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
return`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px"><span style="font-size:16px;width:28px;text-align:center">${m||`<span style="color:var(--dim);font-family:var(--mono);font-size:12px">${i+1}</span>`}</span><div class="tm-avatar" style="width:32px;height:32px;font-size:11px;background:${t.colorDim};color:${t.color}">${t.initials}</div><div style="flex:1"><div style="font-weight:500;font-size:13px">${t.name}</div><div style="font-size:10px;color:var(--teal);font-family:var(--mono)">${t.title}</div></div><span style="font-family:var(--mono);font-size:12px;color:${t.color}">${d}/${tot}</span><span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:36px;text-align:right">${pct}%</span></div>`}).join('');
const cards=TEAM.map(t=>{const d=countDone(t.id),tot=totalSkills(t.id),pct=tot?Math.round(d/tot*100):0;
return`<div class="team-member-card"><div class="tm-avatar" style="background:${t.colorDim};color:${t.color}">${t.initials}</div><div class="tm-name">${t.name}</div><div class="tm-title">${t.title}</div><div class="tm-bar"><div class="tm-bar-fill" style="width:${pct}%;background:${t.color}"></div></div><div class="tm-stats"><b>${d}</b> / ${tot} · ${pct}%</div></div>`}).join('');
el.innerHTML=`<div style="margin-bottom:28px"><h3 style="font-size:16px;font-weight:600;margin-bottom:14px">Leaderboard</h3>${lb}</div><h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Team Progress</h3><div class="team-grid">${cards}</div>`}

renderLogin();
</script>
</body>
</html>
